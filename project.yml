name: MarkdownViewerNative
options:
  bundleIdPrefix: com.meik
  deploymentTarget:
    macOS: "26.0"
configs:
  Debug: debug
  Release: release
settings:
  base:
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    PRODUCT_NAME: "Markdown Viewer"
    PRODUCT_BUNDLE_IDENTIFIER: com.meik.MarkdownViewerNative
    SWIFT_VERSION: "6.0"
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: NO
    INFOPLIST_FILE: Sources/MarkdownViewerNative/Info.plist
    MACOSX_DEPLOYMENT_TARGET: "26.0"
packages:
  SwiftCMark:
    url: https://github.com/swiftlang/swift-cmark
    from: 0.7.1
targets:
  MarkdownViewerNative:
    type: application
    platform: macOS
    sources:
      - path: Sources/MarkdownViewerNative
    dependencies:
      - package: SwiftCMark
        product: cmark-gfm
      - package: SwiftCMark
        product: cmark-gfm-extensions
    settings:
      base:
        PRODUCT_MODULE_NAME: MarkdownViewerNative
        SWIFT_EMIT_LOC_STRINGS: NO
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/../Frameworks"
  MarkdownViewerNativeUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: Tests/MarkdownViewerNativeUITests
    dependencies:
      - target: MarkdownViewerNative
scheme:
  testTargets:
    - MarkdownViewerNativeUITests
