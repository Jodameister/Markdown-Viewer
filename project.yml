name: MarkdownViewerNative
options:
  bundleIdPrefix: com.meik
  deploymentTarget:
    macOS: "26.0"
configs:
  Debug: debug
  Release: release
settings:
  base:
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    PRODUCT_NAME: "Markdown Viewer"
    PRODUCT_BUNDLE_IDENTIFIER: com.meik.MarkdownViewerNative
    SWIFT_VERSION: "6.0"
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: "Markdown Viewer"
    INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
    INFOPLIST_KEY_NSHumanReadableCopyright: ""
    MACOSX_DEPLOYMENT_TARGET: "26.0"
packages:
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui.git
    from: 2.4.1
targets:
  MarkdownViewerNative:
    type: application
    platform: macOS
    sources:
      - path: Sources/MarkdownViewerNative
    dependencies:
      - package: MarkdownUI
    settings:
      base:
        PRODUCT_MODULE_NAME: MarkdownViewerNative
        SWIFT_EMIT_LOC_STRINGS: NO
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/../Frameworks"
  MarkdownViewerNativeUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: Tests/MarkdownViewerNativeUITests
    dependencies:
      - target: MarkdownViewerNative
scheme:
  testTargets:
    - MarkdownViewerNativeUITests
